name: Release

on:
  release:
    types:
      - published

defaults:
  run:
    working-directory: ./sdk

permissions:
  id-token: write # Needed for provenance
  packages: write # Needed to publish package to GitHub package registry
  contents: read # Needed for publishing to JSR

jobs:
  publish:
    name: Publish
    if: '!github.event.prerelease'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./sdk/package.json
          cache: npm
          cache-dependency-path: ./sdk/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --provenance --access public

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./sdk/package.json
          cache: npm
          cache-dependency-path: ./sdk/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@sumup'

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: npm publish --provenance --access public

      - name: Publish to JSR
        run: npx jsr publish

      - name: Install Ant
        run: |
          curl -fsSL https://antjs.org/install | ANT_INSTALL="${RUNNER_TEMP}/ant" bash
          echo "${RUNNER_TEMP}/ant/bin" >> "$GITHUB_PATH"

      - name: Publish to ant.land
        env:
          ANT_TOKEN: "${{ secrets.ANT_TOKEN }}"
        run: |
          printf '%s\n' "//npm.ants.land/:_authToken=${ANT_TOKEN}" >> ~/.npmrc
          ant publish --land
