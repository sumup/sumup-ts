name: Bug report
description: Report a problem in the SumUp Node.js SDK.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Relevant code or error output
      description: Paste a minimal code sample, stack trace, or logs if available.
      render: typescript
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: e.g. 0.9.0
    validations:
      required: true
  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: e.g. Node.js 22.14.0, Deno 2.2.4
  - type: input
    id: package-manager
    attributes:
      label: Package manager
      placeholder: e.g. npm 10, pnpm 9, yarn 4
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.5, Ubuntu 24.04
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
